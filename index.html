<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVOID Chat Pro</title>
<link rel="stylesheet" href="https://cloudflare.com">
<style>
    :root {
        --bg-dark: #0f172a;
        --sidebar-bg: #020617;
        --accent: #22c55e;
        --text-main: #f8fafc;
        --msg-outro: #1e293b;
        --danger: #ef4444;
    }

    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar Estilizada */
    .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid #1e293b; display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px; font-size: 1.2rem; font-weight: bold; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
    
    .groups { flex: 1; overflow-y: auto; padding: 10px; }
    .group-item { 
        padding: 12px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; 
        display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
    }
    .group-item:hover { background: #1e293b; }
    .group-item.active { background: var(--accent); color: white; font-weight: bold; }
    .btn-del { color: #94a3b8; font-size: 0.8rem; border: none; background: none; cursor: pointer; visibility: hidden; }
    .group-item:hover .btn-del { visibility: visible; }
    .btn-del:hover { color: var(--danger); }

    /* Área Principal */
    .main { flex: 1; display: flex; flex-direction: column; background: #0f172a; }
    .topbar { background: #1e293b; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .current-group { font-weight: bold; color: var(--accent); font-size: 1.1rem; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; background: #334155; }
    .badge.admin { background: #f59e0b; color: #000; font-weight: bold; }

    /* Mensagens */
    #mensagens { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
    .msg { padding: 12px 16px; border-radius: 15px; max-width: 65%; position: relative; line-height: 1.4; font-size: 0.95rem; }
    .msg b { display: block; font-size: 0.75rem; margin-bottom: 4px; opacity: 0.8; }
    .eu { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 2px; }
    .outro { background: var(--msg-outro); align-self: flex-start; border-bottom-left-radius: 2px; }

    /* Bottom bar */
    .bottom { padding: 20px; background: #1e293b; display: flex; gap: 10px; }
    #msg-input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #0f172a; color: white; outline: none; border: 1px solid transparent; }
    #msg-input:focus { border-color: var(--accent); }
    .btn-send { background: var(--accent); border: none; padding: 0 20px; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }

    /* Login */
    .login { position: fixed; inset: 0; background: var(--sidebar-bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
    .loginBox { background: #1e293b; padding: 40px; border-radius: 20px; width: 300px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
    .loginBox h2 { margin-top: 0; color: var(--accent); }
    .loginBox input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background: #0f172a; color: white; box-sizing: border-box; }
    
    .fade { animation: fade 0.3s ease-out; }
    @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
</style>
</head>

<body>

<div class="login" id="loginUI">
    <div class="loginBox">
        <h2>MVOID CHAT</h2>
        <input id="nomeInput" placeholder="Seu Nome">
        <input id="senhaInput" placeholder="Sua Senha" type="password">
        <button class="btn-send" style="width: 100%; height: 45px;" onclick="entrar()">ENTRAR</button>
    </div>
</div>

<div class="sidebar">
    <div class="sidebar-header">
        Grupos <button onclick="criarGrupo()" style="background:none; border:none; color:var(--accent); cursor:pointer"><i class="fas fa-plus-circle"></i></button>
    </div>
    <div class="groups" id="groupsList"></div>
</div>

<div class="main">
    <div class="topbar">
        <div class="current-group"># <span id="labelGrupo">global</span></div>
        <div class="user-info">
            <span id="labelNome"></span>
            <span id="labelCargo" class="badge"></span>
        </div>
    </div>

    <div id="mensagens"></div>

    <div class="bottom">
        <input id="msg-input" placeholder="Conversar em #global..." onkeypress="if(event.key==='Enter') enviar()">
        <button class="btn-send" onclick="enviar()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAHdmvUzkJBqd0nBLL2rWIb30LFEeWtnbw",
    authDomain: "zap-proprio-web.firebaseapp.com",
    projectId: "zap-proprio-web"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

let usuario = { nome: localStorage.getItem("nome"), cargo: "USER", isAdmin: false };
let grupoAtual = "global";
let listaGrupos = JSON.parse(localStorage.getItem("meusGrupos")) || ["global", "geral", "jogos"];

window.entrar = () => {
    const n = nomeInput.value;
    const s = senhaInput.value;
    if(!n) return alert("Digite um nome!");

    usuario.nome = n;
    if(n === "MVOIDv" && s === "@italo2021AH2") {
        usuario.isAdmin = true;
        usuario.cargo = "ADMIN";
    }

    localStorage.setItem("nome", n);
    iniciarApp();
}

function iniciarApp() {
    loginUI.style.display = "none";
    labelNome.innerText = usuario.nome;
    labelCargo.innerText = usuario.cargo;
    if(usuario.isAdmin) labelCargo.classList.add("admin");

    renderizarGrupos();
    escutarMensagens();
}

function renderizarGrupos() {
    groupsList.innerHTML = "";
    listaGrupos.forEach(g => {
        let div = document.createElement("div");
        div.className = `group-item ${g === grupoAtual ? 'active' : ''}`;
        div.innerHTML = `
            <span># ${g}</span>
            ${usuario.isAdmin && g !== 'global' ? `<button class="btn-del" onclick="event.stopPropagation(); deletarGrupo('${g}')"><i class="fas fa-trash"></i></button>` : ''}
        `;
        div.onclick = () => mudarGrupo(g);
        groupsList.appendChild(div);
    });
}

window.mudarGrupo = (nomeG) => {
    grupoAtual = nomeG;
    labelGrupo.innerText = nomeG;
    document.getElementById("msg-input").placeholder = `Conversar em #${nomeG}...`;
    renderizarGrupos();
    escutarMensagens();
}

window.criarGrupo = () => {
    if(!usuario.isAdmin) return alert("Apenas Administradores podem criar grupos!");
    let n = prompt("Nome do novo grupo:");
    if(n && !listaGrupos.includes(n)) {
        listaGrupos.push(n);
        localStorage.setItem("meusGrupos", JSON.stringify(listaGrupos));
        renderizarGrupos();
    }
}

window.deletarGrupo = (nomeG) => {
    if(confirm(`Deseja apagar o grupo ${nomeG}?`)) {
        listaGrupos = listaGrupos.filter(g => g !== nomeG);
        localStorage.setItem("meusGrupos", JSON.stringify(listaGrupos));
        if(grupoAtual === nomeG) mudarGrupo("global");
        renderizarGrupos();
    }
}

window.enviar = async () => {
    const input = document.getElementById("msg-input");
    if(!input.value.trim()) return;

    await addDoc(collection(db, "mensagens"), {
        texto: input.value,
        nome: usuario.nome,
        grupo: grupoAtual,
        timestamp: serverTimestamp()
    });
    input.value = "";
}

function escutarMensagens() {
    const q = query(collection(db, "mensagens"), orderBy("timestamp", "asc"));
    
    onSnapshot(q, (snap) => {
        const container = document.getElementById("mensagens");
        container.innerHTML = "";
        
        snap.docs.forEach(doc => {
            const m = doc.data();
            if(m.grupo === grupoAtual) {
                let div = document.createElement("div");
                div.className = `msg fade ${m.nome === usuario.nome ? 'eu' : 'outro'}`;
                div.innerHTML = `<b>${m.nome}</b> ${m.texto}`;
                container.appendChild(div);
            }
        });
        container.scrollTop = container.scrollHeight;
    });
}

// Auto-login se já tiver nome salvo
if(usuario.nome) {
    if(usuario.nome === "MVOIDv") { usuario.isAdmin = true; usuario.cargo = "ADMIN"; }
    iniciarApp();
}
</script>
</body>
</html>
