<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chat Ultra Lite</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#020617;
  height:100vh;
  padding:10px;
}
.sidebar h2 {
  text-align:center;
}
.sidebar button {
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#1e293b;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}
.sidebar button:hover {
  background:#334155;
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOP */
.topbar {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#1e293b;
  align-items:center;
}
.status {
  font-size:12px;
  opacity:.7;
}

/* CHAT */
#mensagens {
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

/* MSG */
.msg {
  max-width:60%;
  margin:5px 0;
  padding:10px;
  border-radius:12px;
  animation:fade .2s;
}
.eu {
  background:#22c55e;
  align-self:flex-end;
}
.outro {
  background:#334155;
  align-self:flex-start;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

/* INPUT */
.bottom {
  display:flex;
  padding:10px;
  background:#1e293b;
}
.bottom input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}
.bottom button {
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}
.bottom button:hover {
  background:#16a34a;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Chat</h2>
  <button onclick="mudarNome()">Alterar Nome</button>
  <button onclick="logout()">Sair</button>
</div>

<div class="main">

<div class="topbar">
  <span id="nomeUser"></span>
  <span class="status" id="status">offline</span>
</div>

<div id="mensagens"></div>

<div class="bottom">
  <input id="msg" placeholder="Digite..." oninput="digitando()" onkeypress="if(event.key==='Enter') enviar()">
  <button onclick="enviar()">Enviar</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let nome = localStorage.getItem("nome") || "User";

window.mudarNome = () => {
  let n = prompt("Novo nome:");
  if(n){
    nome = n;
    localStorage.setItem("nome", nome);
    nomeUser.innerText = nome;
  }
};

window.logout = () => signOut(auth);

window.enviar = async () => {
  if(!msg.value) return;

  await addDoc(collection(db,"mensagens"),{
    texto: msg.value,
    nome,
    uid: auth.currentUser.uid,
    data: Date.now()
  });

  msg.value="";
};

window.digitando = () => {
  status.innerText = "digitando...";
  setTimeout(()=>status.innerText="online",1000);
};

onAuthStateChanged(auth, user=>{
  if(user){
    nomeUser.innerText = nome;
    status.innerText = "online";

    onSnapshot(collection(db,"mensagens"), snap=>{
      mensagens.innerHTML="";

      snap.docs.sort((a,b)=>a.data().data-b.data().data)
      .forEach(d=>{
        let m = d.data();
        let div=document.createElement("div");

        div.className="msg "+(m.uid===user.uid?"eu":"outro");
        div.innerHTML=`<b>${m.nome}</b><br>${m.texto}`;

        mensagens.appendChild(div);
      });

      mensagens.scrollTop = mensagens.scrollHeight;
    });

  } else {
    let email = prompt("Email:");
    let senha = prompt("Senha:");

    signInWithEmailAndPassword(auth,email,senha)
    .catch(()=>createUserWithEmailAndPassword(auth,email,senha));
  }
});
</script>

</body>
</html>
