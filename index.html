<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chat Zap Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
}

.sidebar {
  width: 220px;
  background: #020617;
  height: 100vh;
  padding: 10px;
}

.sidebar h2 {
  text-align: center;
}

.sidebar button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  background: #1e293b;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #1e293b;
}

#mensagens {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.msg {
  max-width: 60%;
  margin: 5px 0;
  padding: 10px;
  border-radius: 12px;
  animation: fade 0.2s ease;
}

.eu { background: #22c55e; align-self: flex-end; }
.outro { background: #334155; align-self: flex-start; }

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

.bottom {
  display: flex;
  padding: 10px;
  background: #1e293b;
}

.bottom input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.bottom button {
  margin-left: 5px;
}

.modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: #020617;
  padding: 20px;
  border-radius: 12px;
  transition: 0.2s;
}

.modal.active {
  transform: translate(-50%, -50%) scale(1);
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>CHAT</h2>
  <button onclick="abrirConfig()">Config</button>
  <button onclick="mudarNome()">Mudar Nome</button>
  <button onclick="logout()">Sair</button>
</div>

<div class="main">

<div class="topbar">
  <span id="nomeUser"></span>
  <button onclick="abrirConfig()">⚙️</button>
</div>

<div id="mensagens"></div>

<div class="bottom">
  <input id="msg" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') enviar()">
  <button onclick="enviar()">Enviar</button>
  <input type="file" id="file" style="display:none" onchange="uploadImagem()">
  <button onclick="file.click()">Imagem</button>
</div>

</div>

<div class="modal" id="modal">
  <h3>Configurações</h3>
  <button onclick="limpar()">Limpar chat</button>
  <button onclick="fecharConfig()">Fechar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHdmvUzkJBqd0nBLL2rWIb30LFEeWtnbw",
  authDomain: "zap-proprio-web.firebaseapp.com",
  projectId: "zap-proprio-web",
  storageBucket: "zap-proprio-web.firebasestorage.app",
  messagingSenderId: "974920784341",
  appId: "1:974920784341:web:8eb8b14928d01a9ed3855c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let nome = localStorage.getItem("nome") || "User";

window.mudarNome = () => {
  let n = prompt("Novo nome:");
  if(n){
    nome = n;
    localStorage.setItem("nome", nome);
    nomeUser.innerText = nome;
  }
};

window.abrirConfig = () => modal.classList.add("active");
window.fecharConfig = () => modal.classList.remove("active");

window.enviar = async () => {
  let texto = msg.value;
  if(!texto) return;

  await addDoc(collection(db, "mensagens"), {
    texto,
    nome,
    uid: auth.currentUser.uid,
    data: Date.now()
  });

  msg.value = "";
};

window.uploadImagem = async () => {
  let file = document.getElementById("file").files[0];
  if(!file) return;

  let url = URL.createObjectURL(file);

  await addDoc(collection(db, "mensagens"), {
    imagem: url,
    nome,
    uid: auth.currentUser.uid,
    data: Date.now()
  });
};

window.limpar = async () => {
  let snap = await getDocs(collection(db, "mensagens"));
  snap.forEach(async d => {
    await deleteDoc(doc(db, "mensagens", d.id));
  });
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, (user)=>{
  if(user){
    nomeUser.innerText = nome;

    onSnapshot(collection(db, "mensagens"), snap=>{
      mensagens.innerHTML = "";

      snap.docs.sort((a,b)=>a.data().data - b.data().data)
      .forEach(d=>{
        let m = d.data();
        let div = document.createElement("div");

        div.classList.add("msg");
        div.classList.add(m.uid === auth.currentUser.uid ? "eu" : "outro");

        if(m.texto){
          div.innerHTML = `<b>${m.nome}</b><br>${m.texto}`;
        }

        if(m.imagem){
          div.innerHTML = `<b>${m.nome}</b><br><img src="${m.imagem}" width="150">`;
        }

        mensagens.appendChild(div);
      });

      mensagens.scrollTop = mensagens.scrollHeight;
    });

  } else {
    alert("Faça login primeiro no código antigo ou adiciona login aqui depois");
  }
});
</script>

</body>
</html>
