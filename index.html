<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

#login, #chat {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

input {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #22c55e;
  color: white;
}

.topo {
  display: flex;
  justify-content: space-between;
  width: 100%;
  padding: 10px;
  background: #1e293b;
}

#mensagens {
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  width: 100%;
}

.msg {
  padding: 8px 12px;
  border-radius: 10px;
  margin: 5px 0;
  max-width: 70%;
}

.eu {
  align-self: flex-end;
  background: #22c55e;
}

.outro {
  align-self: flex-start;
  background: #334155;
}

.enviar {
  display: flex;
  width: 100%;
  padding: 10px;
  background: #1e293b;
}

.enviar input {
  flex: 1;
}
</style>
</head>

<body>

<div id="login">
  <h2>Entrar / Criar conta</h2>
  <input id="email" placeholder="Email">
  <input id="senha" placeholder="Senha" type="password">
  <button onclick="registrar()">Criar conta</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="chat" style="display:none;">
  <div class="topo">
    <span id="nomeUser"></span>
    <div>
      <button onclick="mudarNome()">Nome</button>
      <button onclick="logout()">Sair</button>
    </div>
  </div>

  <div id="mensagens"></div>

  <div class="enviar">
    <input id="msg" placeholder="Mensagem...">
    <button onclick="enviar()">➤</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA KEY",
  authDomain: "SEU AUTHDOMAIN",
  projectId: "SEU PROJECTID",
  storageBucket: "SEU STORAGE",
  messagingSenderId: "SEU ID",
  appId: "SEU APPID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let nome = localStorage.getItem("nome") || "Anônimo";

window.registrar = async () => {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;
  await createUserWithEmailAndPassword(auth, email, senha);
};

window.login = async () => {
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;
  await signInWithEmailAndPassword(auth, email, senha);
};

window.logout = () => signOut(auth);

window.mudarNome = () => {
  let novo = prompt("Novo nome:");
  if(novo){
    nome = novo;
    localStorage.setItem("nome", nome);
    document.getElementById("nomeUser").innerText = nome;
  }
};

window.enviar = async () => {
  let texto = document.getElementById("msg").value;
  if(!texto) return;

  await addDoc(collection(db, "mensagens"), {
    texto,
    nome,
    uid: auth.currentUser.uid,
    data: Date.now()
  });

  document.getElementById("msg").value = "";
};

onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "flex";
    document.getElementById("nomeUser").innerText = nome;

    onSnapshot(collection(db, "mensagens"), (snapshot)=>{
      let chat = document.getElementById("mensagens");
      chat.innerHTML = "";

      snapshot.docs
        .sort((a,b)=>a.data().data - b.data().data)
        .forEach(docu => {
          let m = docu.data();

          let div = document.createElement("div");
          div.classList.add("msg");

          if(m.uid === auth.currentUser.uid){
            div.classList.add("eu");
          } else {
            div.classList.add("outro");
          }

          div.innerHTML = `
            <b>${m.nome}</b><br>
            ${m.texto}
            ${m.uid === auth.currentUser.uid ? `<br><button onclick="apagar('${docu.id}')">🗑️</button>` : ""}
          `;

          chat.appendChild(div);
        });

      chat.scrollTop = chat.scrollHeight;
    });

  } else {
    document.getElementById("login").style.display = "flex";
    document.getElementById("chat").style.display = "none";
  }
});

window.apagar = async (id) => {
  await deleteDoc(doc(db, "mensagens", id));
};
</script>

</body>
</html>
