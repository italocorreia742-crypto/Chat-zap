<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVOID Chat</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;background:#020617;display:flex;flex-direction:column}
.sidebar h2{padding:15px;margin:0;text-align:center}
.groups{flex:1;overflow-y:auto}
.group{padding:10px;cursor:pointer;border-bottom:1px solid #111}
.group:hover{background:#1e293b}
.main{flex:1;display:flex;flex-direction:column}
.topbar{background:#1e293b;padding:10px;display:flex;justify-content:space-between}
#mensagens{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column}
.msg{padding:8px;border-radius:10px;margin:5px;max-width:70%}
.eu{background:#22c55e;align-self:flex-end}
.outro{background:#334155}
.bottom{display:flex;padding:10px;background:#1e293b}
.bottom input{flex:1;padding:10px;border:none;border-radius:10px}
button{padding:10px;border:none;border-radius:10px;background:#22c55e;color:white;margin-left:5px;cursor:pointer}
.login{position:absolute;inset:0;background:#020617;display:flex;justify-content:center;align-items:center}
.loginBox{background:#1e293b;padding:20px;border-radius:15px;display:flex;flex-direction:column;gap:10px}
input{padding:10px;border-radius:10px;border:none}
.fade{animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
</style>
</head>

<body>

<div class="login" id="login">
<div class="loginBox">
<h2>Entrar</h2>
<input id="nomeInput" placeholder="Nome">
<input id="senhaInput" placeholder="Senha" type="password">
<button onclick="entrar()">Entrar</button>
</div>
</div>

<div class="sidebar">
<h2>Grupos</h2>
<div class="groups" id="groups"></div>
<button onclick="criarGrupo()" id="btnCriar">+ Grupo</button>
</div>

<div class="main">
<div class="topbar">
<span id="nomeUser"></span>
<span id="cargo"></span>
</div>

<div id="mensagens"></div>

<div class="bottom">
<input id="msg" placeholder="Mensagem" onkeypress="if(event.key==='Enter') enviar()">
<button onclick="enviar()">Enviar</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHdmvUzkJBqd0nBLL2rWIb30LFEeWtnbw",
  authDomain: "zap-proprio-web.firebaseapp.com",
  projectId: "zap-proprio-web"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

let nome = localStorage.getItem("nome");
let senha = localStorage.getItem("senha");
let grupoAtual = "global";
let isAdmin = false;

window.entrar = () => {
  nome = nomeInput.value;
  senha = senhaInput.value;
  if(!nome || !senha) return;

  localStorage.setItem("nome", nome);
  localStorage.setItem("senha", senha);

  if(nome === "MVOIDv" && senha === "@italo2021AH2"){
    isAdmin = true;
  }

  iniciar();
}

function iniciar(){
  login.style.display = "none";
  nomeUser.innerText = nome;
  cargo.innerText = isAdmin ? "ADMIN" : "USER";

  carregarGrupos();
  carregarMensagens();
}

function carregarGrupos(){
  groups.innerHTML = "";

  ["global","geral","jogos"].forEach(g=>{
    let div = document.createElement("div");
    div.className="group";
    div.innerText=g;
    div.onclick=()=>{grupoAtual=g;carregarMensagens()};
    groups.appendChild(div);
  });
}

window.criarGrupo = async () => {
  if(!isAdmin) return alert("Só admin");
  let nomeGrupo = prompt("Nome do grupo");
  if(!nomeGrupo) return;

  let div = document.createElement("div");
  div.className="group";
  div.innerText=nomeGrupo;
  div.onclick=()=>{grupoAtual=nomeGrupo;carregarMensagens()};
  groups.appendChild(div);
}

window.enviar = async () => {
  if(!msg.value) return;

  await addDoc(collection(db,"mensagens"),{
    texto: msg.value,
    nome,
    grupo: grupoAtual,
    data: Date.now()
  });

  msg.value="";
}

function carregarMensagens(){
  onSnapshot(collection(db,"mensagens"), snap=>{
    mensagens.innerHTML="";

    snap.docs
    .map(d=>d.data())
    .filter(m=>m.grupo===grupoAtual)
    .sort((a,b)=>a.data-b.data)
    .forEach(m=>{
      let div=document.createElement("div");
      div.className="msg fade "+(m.nome===nome?"eu":"outro");
      div.innerHTML=`<b>${m.nome}</b><br>${m.texto}`;
      mensagens.appendChild(div);
    });
  });
}

if(nome && senha){
  if(nome === "MVOIDv" && senha === "@italo2021AH2") isAdmin=true;
  iniciar();
}

</script>

</body>
</html>
