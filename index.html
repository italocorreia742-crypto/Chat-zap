<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MVOID Chat ELITE - FINAL</title>

<!-- ✅ ICONES (FALTAVA ISSO) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    :root { --bg-dark: #020617; --bg-main: #0f172a; --accent: #22c55e; --sidebar: #0f172a; --text: #f8fafc; --danger: #ef4444; --card: #1e293b; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; font-family:'Segoe UI',sans-serif; background:var(--bg-dark); color:var(--text); display:flex; height:100vh; overflow:hidden; }

    .comunidades { width: 72px; background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 12px; flex-shrink: 0; }
    .com-icon { width: 48px; height: 48px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: white; }
    .com-icon:hover, .com-icon.active { border-radius: 16px; background: var(--accent); }

    .sidebar { width: 240px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #1e293b; transition: 0.3s; z-index: 10; }
    .side-header { padding: 15px; font-weight: bold; font-size: 14px; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
    .group-list { flex: 1; padding: 10px; overflow-y: auto; }
    .group-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; color: #94a3b8; background: rgba(255,255,255,0.02); }
    .group-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .group-item.active { background: #334155; color: white; font-weight: bold; }

    .main { flex: 1; display: flex; flex-direction: column; background: #1e293b; }
    .topbar { height: 55px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f172a; }

    #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; }
    .msg.eu { align-self: flex-end; background: var(--accent); color: white; }
    .msg.outro { align-self: flex-start; background: var(--card); }

    .bottom { padding: 15px; }
    .input-wrapper { background: #334155; border-radius: 12px; display: flex; }
    #msgInput { flex: 1; background: none; border: none; padding: 14px; color: white; outline: none; }
    .btn-send { background: var(--accent); border: none; width: 40px; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; }
    .modal-content { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; }
</style>
</head>

<body>

<div class="comunidades">
    <button class="com-icon active"><i class="fas fa-home"></i></button>
    <button class="com-icon" id="btn-lista-membros"><i class="fas fa-users"></i></button>
    <button class="com-icon"><i class="fas fa-user-shield"></i></button>
</div>

<div class="sidebar" id="sidebar">
    <div class="side-header">
        CANAIS <span id="btnCriar" style="cursor:pointer; color:var(--accent); font-size: 22px;">+</span>
    </div>
    <div class="group-list" id="listaGrupos"></div>
</div>

<div class="main">
    <div class="topbar">
        <div># <span id="nomeGrupoTop">global</span></div>
        <span id="userName"></span>
    </div>

    <div id="mensagens"></div>

    <div class="bottom">
        <div class="input-wrapper">
            <input id="msgInput" placeholder="Sua mensagem...">
            <button class="btn-send" id="btnEnviar">➤</button>
        </div>
    </div>
</div>

<!-- ✅ FIREBASE CORRETO -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, updateDoc, deleteDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHdmvUzkJBqd0nBLL2rWIb30LFEeWtnbw",
  authDomain: "zap-proprio-web.firebaseapp.com",
  projectId: "zap-proprio-web",
  storageBucket: "zap-proprio-web.firebasestorage.app",
  messagingSenderId: "974920784341",
  appId: "1:974920784341:web:8eb8b14928d01a9ed3855c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let nome = localStorage.getItem("nome") || prompt("Nome:");
let senha = localStorage.getItem("senha") || prompt("Senha:");

localStorage.setItem("nome", nome);
localStorage.setItem("senha", senha);

let isAdmin = (nome === "MVOIDv" && senha === "@italo2021AH2");
let grupoAtivo = "global";

const msgs = document.getElementById("mensagens");
const input = document.getElementById("msgInput");

async function enviar() {
    let txt = input.value.trim();
    if(!txt) return;

    await addDoc(collection(db, "mensagens"), {
        texto: txt,
        nome,
        grupo: grupoAtivo,
        data: serverTimestamp()
    });

    input.value = "";
}

function escutarMensagens() {
    const q = query(collection(db, "mensagens"), orderBy("data"));
    onSnapshot(q, snap => {
        msgs.innerHTML = "";
        snap.forEach(d => {
            let m = d.data();
            if(m.grupo === grupoAtivo) {
                let div = document.createElement("div");
                div.className = "msg " + (m.nome === nome ? "eu" : "outro");
                div.innerHTML = `<b>${m.nome}</b><br>${m.texto}`;
                msgs.appendChild(div);
            }
        });
    });
}

document.getElementById("btnEnviar").onclick = enviar;
input.addEventListener("keydown", e => { if(e.key === "Enter") enviar(); });

escutarMensagens();
</script>

</body>
</html>
