<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MVOID Chat ELITE</title>
<link rel="stylesheet" href="https://cloudflare.com">
<style>
    :root { --bg-dark: #020617; --bg-main: #0f172a; --accent: #22c55e; --sidebar: #0f172a; --text: #f8fafc; --danger: #ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: sans-serif; background:var(--bg-dark); color:var(--text); display:flex; height:100vh; overflow:hidden; }
    
    .comunidades { width: 72px; background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 12px; gap: 8px; flex-shrink: 0; }
    .com-icon { width: 48px; height: 48px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
    .com-icon.active { border-radius: 16px; background: var(--accent); }

    .sidebar { width: 240px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #1e293b; transition: 0.3s; }
    .side-header { padding: 15px; font-weight: bold; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; }
    
    .group-list { flex: 1; padding: 10px; overflow-y: auto; }
    .group-item { padding: 12px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; margin-bottom: 5px; color: #94a3b8; background: rgba(255,255,255,0.02); }
    .group-item.active { background: #334155; color: white; border-left: 4px solid var(--accent); }
    .btn-del { color: var(--danger); border: none; background: none; cursor: pointer; }

    .main { flex: 1; display: flex; flex-direction: column; background: #1e293b; position: relative; }
    .topbar { height: 55px; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; background: #1e293b; border-bottom: 1px solid #0f172a; }
    .menu-mobile { display: none; font-size: 22px; cursor: pointer; color: var(--accent); margin-right: 15px; }

    #mensagens { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; }
    .msg b { display: block; font-size: 11px; color: var(--accent); margin-bottom: 3px; }
    .msg.eu { align-self: flex-end; background: var(--accent); color: white; }
    .msg.outro { align-self: flex-start; background: #334155; }

    .bottom { padding: 15px; background: #1e293b; }
    .input-wrapper { background: #334155; border-radius: 12px; display: flex; align-items: center; padding: 5px 10px; }
    #msgInput { flex: 1; background: none; border: none; padding: 10px; color: white; outline: none; font-size: 16px; }
    .btn-send { background: var(--accent); border: none; width: 40px; height: 40px; border-radius: 10px; color: white; cursor: pointer; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #1e293b; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
    .modal input { width: 100%; padding: 12px; margin: 10px 0; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; }

    @media (max-width: 768px) {
        .sidebar { position: absolute; left: -100%; height: 100%; z-index: 99; width: 260px; }
        .sidebar.open { left: 72px; }
        .menu-mobile { display: block; }
    }
</style>
</head>
<body>

<div class="comunidades">
    <div class="com-icon active"><i class="fas fa-home"></i></div>
    <div class="com-icon" onclick="alert('Novas comunidades em breve!')"><i class="fas fa-plus"></i></div>
</div>

<div class="sidebar" id="sidebar">
    <div class="side-header">
        CANAIS <span id="btnCriar" style="cursor:pointer; color:var(--accent); font-size:25px">+</span>
    </div>
    <div class="group-list" id="listaGrupos"></div>
</div>

<div class="main">
    <div class="topbar">
        <div style="display:flex; align-items:center">
            <i class="fas fa-bars menu-mobile" id="toggleMenu"></i>
            <b># <span id="nomeGrupoTop">global</span></b>
        </div>
        <div style="display:flex; align-items:center; gap:15px">
            <span id="userName"></span>
            <i class="fas fa-cog" id="btnConfig" style="cursor:pointer"></i>
        </div>
    </div>

    <div id="mensagens"></div>

    <div class="bottom">
        <div class="input-wrapper">
            <input id="msgInput" placeholder="Mensagem..." autocomplete="off">
            <button class="btn-send" id="btnEnviar"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<div id="modalGrupo" class="modal"><div class="modal-content">
    <h3>Novo Canal</h3>
    <input id="novoNomeGrupo" placeholder="Nome do canal">
    <button class="btn-send" style="width:100%; height:45px" id="confirmarGrupo">CRIAR</button>
    <center><button class="fechar" style="background:none; border:none; color:#94a3b8; margin-top:15px; cursor:pointer">Cancelar</button></center>
</div></div>

<!-- IMPORTAÇÃO CORRIGIDA PARA EVITAR CORS -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAHdmvUzkJBqd0nBLL2rWIb30LFEeWtnbw",
    authDomain: "://firebaseapp.com",
    projectId: "zap-proprio-web"
};

// Inicia Firebase (Versão Compat)
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let nome = localStorage.getItem("nome") || prompt("Seu Nome:");
let senha = localStorage.getItem("senha") || prompt("Sua Senha:");
if(!nome) window.location.reload();
localStorage.setItem("nome", nome);

let isAdmin = (nome === "MVOIDv" && senha === "@italo2021AH2");
let grupoAtivo = "global";
let listaCanais = JSON.parse(localStorage.getItem("meusCanais")) || ["global", "geral", "jogos"];

function iniciar() {
    document.getElementById("userName").innerText = nome;
    document.getElementById("btnCriar").style.display = isAdmin ? "block" : "none";
    renderGrupos();
    escutarMensagens();
}

function renderGrupos() {
    const list = document.getElementById("listaGrupos");
    list.innerHTML = "";
    listaCanais.forEach(g => {
        let div = document.createElement("div");
        div.className = `group-item ${g === grupoAtivo ? 'active' : ''}`;
        div.innerHTML = `<span># ${g}</span>`;
        if(isAdmin && g !== 'global') {
            let del = document.createElement("button");
            del.className = "btn-del";
            del.innerHTML = '<i class="fas fa-trash"></i>';
            del.onclick = (e) => { e.stopPropagation(); apagarGrupo(g); };
            div.appendChild(del);
        }
        div.onclick = () => {
            grupoAtivo = g;
            document.getElementById("nomeGrupoTop").innerText = g;
            document.getElementById("sidebar").classList.remove("open");
            renderGrupos();
            escutarMensagens();
        };
        list.appendChild(div);
    });
}

function apagarGrupo(g) {
    if(confirm(`Apagar canal #${g}?`)) {
        listaCanais = listaCanais.filter(item => item !== g);
        localStorage.setItem("meusCanais", JSON.stringify(listaCanais));
        if(grupoAtivo === g) grupoAtivo = "global";
        renderGrupos();
    }
}

async function enviar() {
    let input = document.getElementById("msgInput");
    let txt = input.value.trim();
    if(!txt) return;
    try {
        await db.collection("mensagens").add({
            texto: txt, nome: nome, grupo: grupoAtivo, data: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    } catch(e) { console.error(e); }
}

function escutarMensagens() {
    db.collection("mensagens").orderBy("data", "asc").onSnapshot(snap => {
        const box = document.getElementById("mensagens");
        box.innerHTML = "";
        snap.forEach(doc => {
            let m = doc.data();
            if(m.grupo === grupoAtivo) {
                let div = document.createElement("div");
                div.className = `msg ${m.nome === nome ? 'eu' : 'outro'}`;
                div.innerHTML = `<b>${m.nome}</b>${m.texto}`;
                box.appendChild(div);
            }
        });
        box.scrollTop = box.scrollHeight;
    });
}

// Botões e Eventos
document.getElementById("btnEnviar").onclick = enviar;
document.getElementById("msgInput").onkeypress = (e) => { if(e.key === "Enter") enviar(); };
document.getElementById("toggleMenu").onclick = () => document.getElementById("sidebar").classList.toggle("open");
document.getElementById("btnCriar").onclick = () => document.getElementById("modalGrupo").style.display = "flex";
document.querySelectorAll(".fechar").forEach(b => b.onclick = () => document.getElementById("modalGrupo").style.display = "none");

document.getElementById("confirmarGrupo").onclick = () => {
    let n = document.getElementById("novoNomeGrupo").value.trim().toLowerCase();
    if(n && !listaCanais.includes(n)) {
        listaCanais.push(n);
        localStorage.setItem("meusCanais", JSON.stringify(listaCanais));
        document.getElementById("modalGrupo").style.display = "none";
        renderGrupos();
    }
};

document.getElementById("btnConfig").onclick = () => {
    if(confirm("Deseja sair da conta?")) { localStorage.clear(); window.location.reload(); }
};

iniciar();
</script>
</body>
</html>
