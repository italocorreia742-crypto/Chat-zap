<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chat Zap</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

#login, #chat {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

input {
  margin: 5px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  width: 250px;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #22c55e;
  color: white;
  margin: 3px;
}

.topo {
  display: flex;
  justify-content: space-between;
  width: 100%;
  padding: 12px;
  background: #1e293b;
}

#mensagens {
  height: 70vh;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  width: 100%;
}

.msg {
  padding: 10px;
  border-radius: 12px;
  margin: 6px 0;
  max-width: 65%;
  word-wrap: break-word;
}

.eu {
  align-self: flex-end;
  background: #22c55e;
}

.outro {
  align-self: flex-start;
  background: #334155;
}

.enviar {
  display: flex;
  width: 100%;
  padding: 10px;
  background: #1e293b;
}

.enviar input {
  flex: 1;
}

small {
  opacity: 0.7;
}
</style>
</head>

<body>

<div id="login">
  <h2>Chat Zap 🔥</h2>
  <input id="email" placeholder="Email">
  <input id="senha" placeholder="Senha" type="password">
  <button onclick="registrar()">Criar conta</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="chat" style="display:none;">
  <div class="topo">
    <span id="nomeUser"></span>
    <div>
      <button onclick="mudarNome()">Nome</button>
      <button onclick="limpar()">Limpar</button>
      <button onclick="logout()">Sair</button>
    </div>
  </div>

  <div id="mensagens"></div>

  <div class="enviar">
    <input id="msg" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') enviar()">
    <button onclick="enviar()">➤</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHdmvUzkJBqd0nBLL2rWIb30LFEeWtnbw",
  authDomain: "zap-proprio-web.firebaseapp.com",
  projectId: "zap-proprio-web",
  storageBucket: "zap-proprio-web.firebasestorage.app",
  messagingSenderId: "974920784341",
  appId: "1:974920784341:web:8eb8b14928d01a9ed3855c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let nome = localStorage.getItem("nome") || "Anônimo";

window.registrar = async () => {
  let email = emailInput.value;
  let senha = senhaInput.value;
  await createUserWithEmailAndPassword(auth, email, senha);
};

window.login = async () => {
  let email = emailInput.value;
  let senha = senhaInput.value;
  await signInWithEmailAndPassword(auth, email, senha);
};

window.logout = () => signOut(auth);

window.mudarNome = () => {
  let novo = prompt("Novo nome:");
  if(novo){
    nome = novo;
    localStorage.setItem("nome", nome);
    nomeUser.innerText = nome;
  }
};

window.enviar = async () => {
  let texto = msg.value;
  if(!texto) return;

  await addDoc(collection(db, "mensagens"), {
    texto,
    nome,
    uid: auth.currentUser.uid,
    data: Date.now()
  });

  msg.value = "";
};

window.limpar = async () => {
  if(!confirm("Apagar TODAS mensagens?")) return;
  let snap = await getDocs(collection(db, "mensagens"));
  snap.forEach(async d => {
    await deleteDoc(doc(db, "mensagens", d.id));
  });
};

onAuthStateChanged(auth, (user) => {
  if(user){
    login.style.display = "none";
    chat.style.display = "flex";
    nomeUser.innerText = nome;

    onSnapshot(collection(db, "mensagens"), (snapshot)=>{
      mensagens.innerHTML = "";

      snapshot.docs
        .sort((a,b)=>a.data().data - b.data().data)
        .forEach(docu => {
          let m = docu.data();

          let hora = new Date(m.data).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

          let div = document.createElement("div");
          div.classList.add("msg");

          if(m.uid === auth.currentUser.uid){
            div.classList.add("eu");
          } else {
            div.classList.add("outro");
          }

          div.innerHTML = `
            <b>${m.nome}</b><br>
            ${m.texto}<br>
            <small>${hora}</small>
            ${m.uid === auth.currentUser.uid ? `<br><button onclick="apagar('${docu.id}')">🗑️</button>` : ""}
          `;

          mensagens.appendChild(div);
        });

      mensagens.scrollTop = mensagens.scrollHeight;
    });

  } else {
    login.style.display = "flex";
    chat.style.display = "none";
  }
});

window.apagar = async (id) => {
  await deleteDoc(doc(db, "mensagens", id));
};
</script>

</body>
</html>
