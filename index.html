<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVOID Chat Ultimate</title>
<link rel="stylesheet" href="https://cloudflare.com">
<style>
    :root {
        --bg-main: #0f172a; --sidebar: #020617; --accent: #22c55e;
        --danger: #ef4444; --text: #f8fafc; --card: #1e293b;
    }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text); display: flex; height: 100vh; }

    /* Barra Lateral de Comunidades (Ícones) */
    .guilds { width: 70px; background: #000; display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 10px; }
    .guild-icon { width: 48px; height: 48px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; color: var(--accent); }
    .guild-icon:hover, .guild-icon.active { border-radius: 15px; background: var(--accent); color: white; }

    /* Sidebar de Grupos */
    .sidebar { width: 240px; background: var(--sidebar); display: flex; flex-direction: column; }
    .side-header { padding: 20px; font-weight: bold; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; }
    
    .groups-container { flex: 1; padding: 10px; overflow-y: auto; }
    .group-item { 
        padding: 10px; border-radius: 5px; margin-bottom: 4px; cursor: pointer;
        display: flex; justify-content: space-between; align-items: center;
    }
    .group-item:hover { background: #1e293b; }
    .group-item.active { background: #334155; border-left: 4px solid var(--accent); }
    .btn-action { border: none; background: none; color: #64748b; cursor: pointer; padding: 5px; }
    .btn-action:hover { color: var(--danger); }

    /* Área de Chat */
    .main { flex: 1; display: flex; flex-direction: column; }
    .topbar { height: 60px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    
    #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 70%; padding: 12px; border-radius: 12px; position: relative; }
    .msg.me { align-self: flex-end; background: var(--accent); color: white; }
    .msg.other { align-self: flex-start; background: var(--card); }
    .msg-info { font-size: 0.7rem; margin-bottom: 4px; display: block; opacity: 0.8; }

    /* Input */
    .input-area { padding: 20px; background: var(--bg-main); }
    .input-box { background: #334155; border-radius: 8px; display: flex; padding: 5px 15px; align-items: center; }
    .input-box input { flex: 1; background: none; border: none; color: white; padding: 12px; outline: none; }

    /* Janelas Modais */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: var(--card); padding: 30px; border-radius: 15px; width: 400px; }
</style>
</head>
<body>

<!-- Navegação de Comunidades -->
<div class="guilds">
    <div class="guild-icon active" title="Minha Rede"><i class="fas fa-network-wired"></i></div>
    <div class="guild-icon" onclick="alert('Funcionalidade de novas comunidades em breve!')"><i class="fas fa-plus"></i></div>
</div>

<div class="sidebar">
    <div class="side-header">
        <span>CANAIS</span>
        <div id="admin-tools" style="display:none">
            <button class="btn-action" onclick="abrirModalCriar()" title="Criar Grupo"><i class="fas fa-plus"></i></button>
            <button class="btn-action" onclick="abrirConfig()" title="Configurações"><i class="fas fa-cog"></i></button>
        </div>
    </div>
    <div class="groups-container" id="listaGrupos"></div>
</div>

<div class="main">
    <div class="topbar">
        <div style="font-weight: bold"># <span id="nomeGrupoAtivo">geral</span></div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="user-display"></div>
            <button class="btn-action" onclick="abrirConfig()"><i class="fas fa-cog fa-lg"></i></button>
        </div>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <div class="input-box">
            <input id="msgInput" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') enviar()">
            <button class="btn-action" style="color:var(--accent)" onclick="enviar()"><i class="fas fa-paper-plane fa-lg"></i></button>
        </div>
    </div>
</div>

<!-- Modal Configurações -->
<div id="modalConfig" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-cog"></i> Configurações</h3>
        <p>Usuário: <b id="confNome"></b></p>
        <p>Cargo: <span id="confCargo" style="color:var(--accent)"></span></p>
        <hr border="0" style="border-top:1px solid #334155">
        <button class="btn-action" onclick="logout()" style="color:var(--danger)"><i class="fas fa-sign-out-alt"></i> Sair da Conta</button>
        <button class="btn-action" style="float:right" onclick="fecharModais()">Fechar</button>
    </div>
</div>

<!-- Modal Criar Grupo -->
<div id="modalCriar" class="modal">
    <div class="modal-content">
        <h3>Criar Novo Canal</h3>
        <input id="novoNomeGrupo" style="width:90%; padding:10px; border-radius:5px; border:none; background:#0f172a; color:white" placeholder="Ex: suporte-tecnico">
        <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:10px">
            <button onclick="fecharModais()">Cancelar</button>
            <button onclick="confirmarCriarGrupo()" style="background:var(--accent); border:none; padding:10px 20px; border-radius:5px; color:white">Criar</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://gstatic.com";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://gstatic.com";

const firebaseConfig = {
    apiKey: "AIzaSyAHdmvUzkJBqd0nBLL2rWIb30LFEeWtnbw",
    authDomain: "://firebaseapp.com",
    projectId: "zap-proprio-web"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

let meuNome = localStorage.getItem("nome") || prompt("Seu nome:");
let minhaSenha = localStorage.getItem("senha") || prompt("Sua senha:");
let isAdmin = (meuNome === "MVOIDv" && minhaSenha === "@italo2021AH2");
let grupoAtivo = "geral";
let grupos = JSON.parse(localStorage.getItem("canais")) || ["global", "geral", "jogos", "suporte"];

if(!meuNome) window.location.reload();
localStorage.setItem("nome", meuNome);
localStorage.setItem("senha", minhaSenha);

function iniciar() {
    user-display.innerHTML = `${meuNome} <small style="background:#f59e0b; color:black; padding:2px 5px; border-radius:4px; font-weight:bold">${isAdmin ? 'ADMIN' : 'USER'}</small>`;
    if(isAdmin) document.getElementById("admin-tools").style.display = "block";
    renderGrupos();
    carregarMensagens();
}

window.renderGrupos = () => {
    listaGrupos.innerHTML = "";
    grupos.forEach(g => {
        let div = document.createElement("div");
        div.className = `group-item ${g === grupoAtivo ? 'active' : ''}`;
        div.innerHTML = `
            <span># ${g}</span>
            ${isAdmin && g !== 'geral' ? `<button class="btn-action" onclick="event.stopPropagation(); apagarGrupo('${g}')"><i class="fas fa-trash"></i></button>` : ''}
        `;
        div.onclick = () => { grupoAtivo = g; nomeGrupoAtivo.innerText = g; renderGrupos(); carregarMensagens(); };
        listaGrupos.appendChild(div);
    });
}

window.apagarGrupo = (n) => {
    if(confirm(`Apagar canal #${n}?`)) {
        grupos = grupos.filter(x => x !== n);
        localStorage.setItem("canais", JSON.stringify(grupos));
        if(grupoAtivo === n) grupoAtivo = "geral";
        renderGrupos();
    }
}

window.abrirModalCriar = () => modalCriar.style.display = "flex";
window.abrirConfig = () => {
    confNome.innerText = meuNome;
    confCargo.innerText = isAdmin ? "ADMINISTRADOR PRINCIPAL" : "MEMBRO";
    modalConfig.style.display = "flex";
}
window.fecharModais = () => { modalCriar.style.display = "none"; modalConfig.style.display = "none"; }

window.confirmarCriarGrupo = () => {
    let n = novoNomeGrupo.value.trim().toLowerCase().replace(/\s+/g, '-');
    if(n && !grupos.includes(n)) {
        grupos.push(n);
        localStorage.setItem("canais", JSON.stringify(grupos));
        fecharModais();
        renderGrupos();
    }
}

window.logout = () => { localStorage.clear(); window.location.reload(); }

window.enviar = async () => {
    let t = msgInput.value;
    if(!t) return;
    await addDoc(collection(db, "mensagens"), {
        texto: t, nome: meuNome, grupo: grupoAtivo, time: serverTimestamp()
    });
    msgInput.value = "";
}

function carregarMensagens() {
    const q = query(collection(db, "mensagens"), orderBy("time", "asc"));
    onSnapshot(q, (snap) => {
        chat-box.innerHTML = "";
        snap.docs.forEach(d => {
            let m = d.data();
            if(m.grupo === grupoAtivo) {
                let div = document.createElement("div");
                div.className = `msg ${m.nome === meuNome ? 'me' : 'other'}`;
                div.innerHTML = `<span class="msg-info">${m.nome}</span>${m.texto}`;
                chat-box.appendChild(div);
            }
        });
        chat-box.scrollTop = chat-box.scrollHeight;
    });
}

iniciar();
</script>
</body>
</html>
